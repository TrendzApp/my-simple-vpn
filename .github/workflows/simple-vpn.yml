name: VPN ساده (بدون ngrok)

on:
  workflow_dispatch:

jobs:
  vpn:
    runs-on: ubuntu-latest
    
    steps:
      - name: نصب ابزارها
        run: |
          sudo apt update
          sudo apt install -y dante-server qrencode curl
          
      - name: تنظیم SOCKS5 Proxy
        run: |
          sudo tee /etc/danted.conf > /dev/null <<'EOF'
          logoutput: syslog
          internal: 0.0.0.0 port = 1080
          external: eth0
          clientmethod: none
          socksmethod: none
          user.privileged: root
          user.unprivileged: nobody
          
          client pass {
              from: 0.0.0.0/0 to: 0.0.0.0/0
          }
          
          socks pass {
              from: 0.0.0.0/0 to: 0.0.0.0/0
              protocol: tcp udp
          }
          EOF
          
          sudo systemctl restart danted
          sudo systemctl status danted
          
      - name: نصب و راه‌اندازی Cloudflare Tunnel
        run: |
          # دانلود cloudflared
          wget -q https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
          sudo dpkg -i cloudflared-linux-amd64.deb
          
          # راه‌اندازی تونل
          cloudflared tunnel --url tcp://localhost:1080 --no-autoupdate &
          sleep 10
          
      - name: نمایش اطلاعات اتصال
        run: |
          echo "=========================================="
          echo "✅ SOCKS5 Proxy آماده است!"
          echo "=========================================="
          echo ""
          echo "📋 اطلاعات اتصال:"
          echo ""
          
          # گرفتن لینک Cloudflare
          TUNNEL_URL=$(curl -s http://localhost:4040/api/tunnels 2>/dev/null | grep -o '"public_url":"[^"]*' | cut -d'"' -f4 || echo "در حال دریافت...")
          
          if [ "$TUNNEL_URL" = "در حال دریافت..." ]; then
            echo "⏳ لطفاً 30 ثانیه صبر کنید و لاگ‌ها را بررسی کنید"
            echo ""
            echo "🔗 آدرس Proxy:"
            echo "   نوع: SOCKS5"
            echo "   پورت: 1080"
            echo ""
            echo "📱 تنظیمات گوشی (Android):"
            echo "   Settings → Network → Proxy → Manual"
            echo "   Proxy hostname: [آدرس Cloudflare]"
            echo "   Proxy port: 1080"
            echo ""
            echo "💻 تنظیمات مرورگر (Firefox):"
            echo "   Settings → Network Settings → Manual proxy"
            echo "   SOCKS Host: [آدرس Cloudflare]"
            echo "   Port: 1080"
            echo "   SOCKS v5: ✓"
          else
            echo "🔗 آدرس Proxy: $TUNNEL_URL"
            echo "   نوع: SOCKS5"
            echo "   پورت: 1080"
          fi
          
          echo ""
          echo "=========================================="
          
      - name: نگه داشتن سرویس فعال
        run: |
          echo "✅ Proxy فعال است و تا 6 ساعت کار می‌کند"
          echo "⚠️ برای خاموش کردن، دکمه Cancel را بزنید"
          
          # نمایش آمار هر 5 دقیقه
          for i in {1..72}; do
            echo "⏰ زمان سپری شده: $((i*5)) دقیقه"
            sleep 300
          done

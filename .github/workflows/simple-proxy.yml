name: Simple SOCKS5 Proxy

on:
  workflow_dispatch:

jobs:
  proxy:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    
    steps:
      - name: نصب ابزارها
        run: |
          sudo apt-get update
          sudo apt-get install -y dante-server curl
          
      - name: تنظیم SOCKS5 Server
        run: |
          # ساخت فایل کانفیگ dante
          sudo tee /etc/danted.conf > /dev/null <<'EOF'
          logoutput: syslog
          internal: 0.0.0.0 port = 1080
          external: eth0
          clientmethod: none
          socksmethod: none
          user.privileged: root
          user.unprivileged: nobody
          
          client pass {
              from: 0.0.0.0/0 to: 0.0.0.0/0
          }
          
          socks pass {
              from: 0.0.0.0/0 to: 0.0.0.0/0
              protocol: tcp udp
          }
          EOF
          
          # شروع dante server
          sudo danted
          
          # چک کردن که سرویس روشن شده
          sleep 2
          if ! sudo netstat -tlnp | grep 1080; then
            echo "❌ خطا: SOCKS5 server شروع نشد"
            exit 1
          fi
          
          echo "✅ SOCKS5 server روی پورت 1080 فعال شد"
          
      - name: نصب Cloudflare Tunnel
        run: |
          wget -q https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
          sudo dpkg -i cloudflared-linux-amd64.deb
          
      - name: راه‌اندازی Tunnel
        run: |
          # شروع tunnel
          cloudflared tunnel --url tcp://localhost:1080 --no-autoupdate > tunnel.log 2>&1 &
          
          # صبر برای شروع tunnel
          echo "⏳ در حال راه‌اندازی تونل..."
          sleep 15
          
      - name: نمایش اطلاعات اتصال
        run: |
          # خواندن لینک از لاگ
          if [ ! -f tunnel.log ]; then
            echo "❌ فایل لاگ پیدا نشد"
            exit 1
          fi
          
          echo "📄 محتوای لاگ:"
          cat tunnel.log
          echo ""
          echo "---"
          
          # استخراج لینک
          TUNNEL_URL=$(grep -oP 'https://[a-z0-9-]+\.trycloudflare\.com' tunnel.log | head -1)
          
          if [ -z "$TUNNEL_URL" ]; then
            echo "❌ لینک تونل پیدا نشد. لاگ کامل:"
            cat tunnel.log
            exit 1
          fi
          
          # حذف https:// برای گرفتن hostname
          PROXY_HOST=$(echo $TUNNEL_URL | sed 's|https://||')
          
          echo ""
          echo "=========================================="
          echo "✅ پروکسی آماده است!"
          echo "=========================================="
          echo ""
          echo "📋 اطلاعات اتصال:"
          echo ""
          echo "   نوع: SOCKS5"
          echo "   آدرس: $PROXY_HOST"
          echo "   پورت: 443"
          echo ""
          echo "=========================================="
          echo "🌐 تنظیمات مرورگر:"
          echo "=========================================="
          echo ""
          echo "برای Chrome/Firefox با FoxyProxy:"
          echo "  1. نصب افزونه FoxyProxy Standard"
          echo "  2. Options → Add New Proxy"
          echo "  3. پر کردن فرم:"
          echo "     - Title: GitHub Proxy"
          echo "     - Type: SOCKS5"
          echo "     - Hostname: $PROXY_HOST"
          echo "     - Port: 443"
          echo "  4. Save و فعال کردن"
          echo ""
          echo "=========================================="
          echo "📱 تنظیمات موبایل:"
          echo "=========================================="
          echo ""
          echo "Android:"
          echo "  Settings → Wi-Fi → نگه‌داشتن شبکه"
          echo "  → Modify → Advanced → Proxy Manual:"
          echo "     - Hostname: $PROXY_HOST"
          echo "     - Port: 443"
          echo ""
          echo "iOS:"
          echo "  Settings → Wi-Fi → (i) → Configure Proxy"
          echo "  → Manual:"
          echo "     - Server: $PROXY_HOST"
          echo "     - Port: 443"
          echo ""
          echo "=========================================="
          echo "⏰ پروکسی تا 6 ساعت فعال است"
          echo "🔄 برای اجرای مجدد: Actions → Run workflow"
          echo "=========================================="
          
          # ذخیره اطلاعات برای استفاده بعدی
          echo "PROXY_HOST=$PROXY_HOST" >> proxy_info.txt
          
      - name: تست اتصال
        run: |
          echo ""
          echo "🧪 تست اتصال پروکسی..."
          
          # تست با curl
          if curl -x socks5h://localhost:1080 -s --max-time 10 https://ipinfo.io/ip; then
            echo "✅ پروکسی کار می‌کند!"
          else
            echo "⚠️ تست محلی ناموفق (ممکن است از طریق Cloudflare کار کند)"
          fi
          
      - name: نگه داشتن سرویس
        run: |
          echo ""
          echo "✅ سرویس فعال است و در حال اجرا..."
          echo ""
          
          # حلقه برای نگه داشتن سرویس
          for i in {1..72}; do
            MINUTES=$((i*5))
            
            # چک کردن وضعیت هر 5 دقیقه
            if ! ps aux | grep -q "[d]anted"; then
              echo "❌ SOCKS5 server متوقف شده، راه‌اندازی مجدد..."
              sudo danted
            fi
            
            if ! ps aux | grep -q "[c]loudflared"; then
              echo "❌ Cloudflare tunnel متوقف شده"
              exit 1
            fi
            
            # نمایش وضعیت
            if [ $((i % 6)) -eq 0 ]; then
              HOURS=$((MINUTES / 60))
              echo "⏰ زمان سپری شده: $HOURS ساعت"
              echo "📊 وضعیت: ✅ فعال"
              echo "---"
            fi
            
            sleep 300
          done
          
          echo ""
          echo "⏰ زمان 6 ساعته به پایان رسید"
          echo "🔄 برای ادامه، workflow را دوباره اجرا کنید"

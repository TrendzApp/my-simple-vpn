name: Fast SOCKS5 Proxy

on:
  workflow_dispatch:

jobs:
  proxy:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    
    steps:
      - name: شروع WARP Proxy
        run: |
          # ساخت شبکه
          docker network create warp-net || true
          
          # راه‌اندازی WARP
          docker run -d \
            --name warp \
            --network warp-net \
            -p 1080:1080 \
            --cap-add NET_ADMIN \
            --sysctl net.ipv6.conf.all.disable_ipv6=0 \
            --sysctl net.ipv4.conf.all.src_valid_mark=1 \
            -v warp-data:/var/lib/cloudflare-warp \
            caomingjun/warp
          
          echo "⏳ صبر کن تا WARP آماده بشه..."
          sleep 15
          
          # تست اتصال
          for i in {1..5}; do
            if curl --socks5-hostname 127.0.0.1:1080 https://cloudflare.com/cdn-cgi/trace 2>/dev/null | grep -E "warp=(on|plus)"; then
              echo "✅ WARP فعال شد!"
              break
            fi
            echo "🔄 تلاش $i از 5..."
            sleep 3
          done

      - name: نصب Cloudflare Tunnel
        run: |
          wget -q https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
          sudo dpkg -i cloudflared-linux-amd64.deb

      - name: راه‌اندازی Tunnel
        run: |
          echo "🚀 در حال ساخت آدرس عمومی..."
          cloudflared tunnel --url socks5://localhost:1080 > tunnel.log 2>&1 &
          sleep 10
          
          # استخراج آدرس
          PROXY_URL=$(grep -oP 'https://[a-z0-9-]+\.trycloudflare\.com' tunnel.log | head -1)
          
          if [ -z "$PROXY_URL" ]; then
            echo "❌ خطا در ساخت آدرس!"
            cat tunnel.log
            exit 1
          fi
          
          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "✅ Proxy آماده است!"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo ""
          echo "📍 آدرس Proxy:"
          echo "   $PROXY_URL"
          echo ""
          echo "🔧 تنظیمات:"
          echo "   نوع: SOCKS5"
          echo "   آدرس: ${PROXY_URL#https://}"
          echo "   پورت: 443"
          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          
          # نگه‌داشتن Workflow
          echo "⏰ Proxy تا 6 ساعت فعال می‌مونه..."
          sleep 21600

      - name: پاکسازی
        if: always()
        run: |
          docker stop warp || true
          docker rm warp || true
